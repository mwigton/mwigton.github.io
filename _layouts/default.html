<!doctype html>
<html lang="en">
{% include head.html %}

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a href="/" class="logo" style="background: none; border-radius: 50%; overflow: hidden;">
          <img src="/assets/images/profile.png" alt="Michael Wigton"
            style="width: 100%; height: 100%; object-fit: cover;">
        </a>
        <div class="site-title">
          <div class="title">Michael Wigton</div>
          <div class="subtitle">Senior Software Engineer • Interactive Developer</div>
        </div>
      </div>
      <nav class="main-nav">
        <a href="assets/files/michael_wigton_resume.pdf" target="_blank">Resume</a>
        <a href="https://github.com/mwigton">Github</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <!-- Video modal (controlled by assets/js/main.js) -->
  <div id="video-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <button class="modal-close" aria-label="Close video" data-close>×</button>
      <div class="modal-body">
        <iframe id="modal-iframe" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <script src="/assets/js/main.js" defer></script>
</body>

</html>
