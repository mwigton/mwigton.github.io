<!doctype html>
<html lang="en">
{% include head.html %}

<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a href="/" class="logo">
          <img src="/assets/images/profile.webp" alt="Michael Wigton"
            style="width: 100%; height: 100%; object-fit: cover;">
        </a>
        <div class="site-title">
          <div class="title">Michael Wigton</div>
          <div class="subtitle">Senior Software Engineer • Interactive Developer</div>
        </div>
      </div>
      <div class="header-right">
        <nav class="main-nav">
          <a href="/"{% if page.url == '/' %} class="active"{% endif %}>Projects</a>
          <a href="/resume/"{% if page.url contains '/resume/' %} class="active"{% endif %}>Resume</a>
        </nav>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark Mode"
          style="background:none; border:none; color:var(--text); cursor:pointer; padding:4px; display:flex;">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
          <svg class="icon-menu" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg class="icon-close" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <!-- Video modal (controlled by assets/js/main.js) -->
  <div id="video-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <button class="modal-close" aria-label="Close video" data-close>×</button>
      <div class="modal-body">
        <iframe id="modal-iframe" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture"
          allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- Gallery modal (controlled by assets/js/main.js) -->
  <div id="gallery-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-gallery></div>
    <div class="modal-panel gallery-panel">
      <button class="modal-close" aria-label="Close gallery" data-close-gallery>×</button>
      <div class="gallery-body">
        <img id="gallery-image" src="" alt="">
        <div id="gallery-caption" class="gallery-caption"></div>
        <button class="gallery-nav gallery-prev" aria-label="Previous image">‹</button>
        <button class="gallery-nav gallery-next" aria-label="Next image">›</button>
        <div class="gallery-counter">
          <span id="gallery-current">1</span> / <span id="gallery-total">1</span>
        </div>
      </div>
    </div>
  </div>

  <script src="/assets/js/main.js?v={{ site.time | date: '%s' }}" defer></script>
</body>

</html>
